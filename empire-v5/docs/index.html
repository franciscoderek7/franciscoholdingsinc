<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Holdings Inc.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;color:#d4af37;font-family:'Georgia',serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
h1{font-size:3rem;letter-spacing:8px;font-weight:400;background:linear-gradient(135deg,#d4af37,#f4e4ba,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem}
.spinner{width:100px;height:100px;border:2px solid rgba(212,175,55,0.1);border-top:2px solid #d4af37;border-radius:50%;animation:spin 1s linear infinite;box-shadow:0 0 30px rgba(212,175,55,0.2)}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#666;margin-top:2rem;letter-spacing:4px;font-size:12px;text-transform:uppercase}
</style>
</head>
<body>
<h1>FRANCISCO HOLDINGS</h1>
<div class="spinner"></div>
<p>Empire Loading</p>
</body>
</html>
