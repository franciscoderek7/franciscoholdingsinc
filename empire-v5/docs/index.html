*{margin:0;padding:0;box-sizing:border-box}
body{background:#020202;color:#e8e8e8;font-family:'Montserrat',sans-serif;height:100vh;overflow:hidden}
#loading{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#0a0a0a 0%,#020202 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 2s ease-out}

.rr-container{position:relative;width:140px;height:140px;margin:3rem 0}
.rr-spirit{font-size:72px;z-index:10;position:relative;filter:drop-shadow(0 0 30px rgba(201,176,55,0.4)) drop-shadow(0 0 60px rgba(201,176,55,0.1));animation:spiritFloat 3s ease-in-out infinite}
@keyframes spiritFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.rr-ring{position:absolute;border:1px solid rgba(201,176,55,0.08);border-radius:50%;animation:rrSpin linear infinite}
.rr-ring:nth-child(1){width:140px;height:140px;border-top:2px solid rgba(201,176,55,0.6);animation-duration:3s}
.rr-ring:nth-child(2){width:180px;height:180px;border-right:1px solid rgba(192,192,192,0.3);animation-duration:5s;animation-direction:reverse}
.rr-ring:nth-child(3){width:220px;height:220px;border-bottom:1px solid rgba(201,176,55,0.2);animation-duration:7s}
.rr-ring:nth-child(4){width:260px;height:260px;border-left:1px solid rgba(192,192,192,0.15);animation-duration:9s;animation-direction:reverse}
@keyframes rrSpin{to{transform:rotate(360deg)}}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;box-shadow:0 0 4px #fff;animation:twinkle 2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.diamond{position:absolute;font-size:8px;color:rgba(255,255,255,0.3);animation:diamondSparkle 1.5s ease-in-out infinite}

.rr-bar{width:200px;height:1px;background:rgba(201,176,55,0.1);margin-top:2rem;position:relative;overflow:hidden}
.rr-bar-fill{height:100%;background:linear-gradient(90deg,transparent,#c9b037,transparent);width:0%;animation:rrLoad 4s ease-out forwards}
@keyframes rrLoad{to{width:100%}}
.rr-text{color:#555;font-size:10px;letter-spacing:6px;margin-top:16px;text-transform:uppercase;font-weight:300}

#canvas-container{position:fixed;inset:0;z-index:1}
.online{position:fixed;top:1rem;right:1rem;color:#00ff88;font-size:0.7rem;font-weight:500;letter-spacing:2px;z-index:100;font-family:'Montserrat',sans-serif}
.online::before{content:'';width:6px;height:6px;background:#00ff88;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.floor-info{position:fixed;bottom:18%;left:50%;transform:translateX(-50%);text-align:center;z-index:100;padding:2rem 3rem;background:rgba(5,5,5,0.85);border:1px solid rgba(201,176,55,0.15);border-radius:4px;backdrop-filter:blur(20px);min-width:340px;cursor:pointer}

#elevator-panel{position:fixed;right:1rem;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:0.25rem;max-height:70vh;overflow-y:auto;padding:0.5rem;background:rgba(5,5,5,0.7);border:1px solid rgba(201,176,55,0.08);border-radius:2px}
.elevator-btn{width:32px;height:32px;border:1px solid rgba(201,176,55,0.15);background:transparent;color:#666;font-family:'Montserrat',sans-serif;font-size:0.6rem;border-radius:1px;cursor:pointer;transition:all 0.3s;font-weight:300}
.elevator-btn:hover,.elevator-btn.active{background:rgba(201,176,55,0.1);color:#c9b037;border-color:rgba(201,176,55,0.3)}
#nav-arrows{position:fixed;bottom:2rem;right:2rem;display:flex;flex-direction:column;gap:0.5rem;z-index:100}

#floor-counter{position:fixed;top:1rem;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-size:1.1rem;color:#c9b037;z-index:100;background:rgba(5,5,5,0.8);padding:0.4rem 1.5rem;border-radius:2px;border:1px solid rgba(201,176,55,0.1);letter-spacing:4px;font-weight:400}
#god-mode{position:fixed;top:1rem;left:1rem;font-family:'Montserrat',sans-serif;font-size:0.55rem;color:rgba(201,176,55,0.25);z-index:100;letter-spacing:3px;text-transform:uppercase;font-weight:300}

</style>

<body>

<script type="module">
import * as THREE from "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js";
import { gsap } from "https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js";
const companies=[{id:1,name:"Francisco Holdings HQ",desc:"Luxury corporate ecosystem",domain:"franciscoholdingsinc.com",color:"#c9b037",icon:"🏛️"},{id:2,name:"OmniGuard Security",desc:"AI cybersecurity — Gemma 31B powered",domain:"omniaguard.com",color:"#00ff88",icon:"🛡️"},{id:3,name:"PrimeDox AI",desc:"Legal document generation engine",domain:"primedoxai.com",color:"#4dabf7",icon:"📄"},{id:4,name:"CCLDR Legal",desc:"Cannabis constitutional law education",domain:"ccldr.net",color:"#00f0ff",icon:"⚖️"},{id:5,name:"Vault Velocity Auto",desc:"Luxury vehicles, jets, yachts brokerage",domain:"vaultvelocityauto.com",color:"#ff0066",icon:"🏎️"},{id:6,name:"TechPetCage",desc:"Smart pet monitoring & protection",domain:"techpetcage.com",color:"#ffaa00",icon:"🐾"},{id:7,name:"Kiaros Time AI",desc:"Time optimization & prediction",domain:"kiaros.com",color:"#aa00ff",icon:"⏰"},{id:8,name:"CleanSwarm",desc:"Autonomous cleaning robot swarms",domain:"cleanswarm.com",color:"#00ffaa",icon:"🤖"},{id:9,name:"BENO-X Constitutional",desc:"Charter rights defense platform",domain:"beno-x.com",color:"#ff4444",icon:"⚖️"},{id:10,name:"Gap Hunter AI",desc:"Market gap detection worth millions",domain:"gaphunter.com",color:"#44ff44",icon:"🔍"},{id:11,name:"WeedLaw Academy",desc:"Cannabis law education for lawyers",domain:"weedlaw-education.thinkific.com",color:"#88ff00",icon:"🌿"},{id:12,name:"VigiLax",desc:"Advanced surveillance & monitoring",domain:"vigilax.com",color:"#ff8800",icon:"👁️"},{id:13,name:"SoulStack",desc:"Loyalty & achievement platform",domain:"soulstack.com",color:"#ff00ff",icon:"💎"},{id:14,name:"CCC Cannabis",desc:"A-to-Z cannabis superhighway",domain:"ccldr.net",color:"#00ff44",icon:"🌿"},{id:15,name:"PrimeDox AI HQ",desc:"Central AI specialist portal",domain:"zprimedoxaihq.com",color:"#4dabf7",icon:"🤖"}];
const names=["Phoenix","Dominion","Ascension","Sovereign","Titan","Apex","Zenith","Pinnacle","Summit","Crown","Throne","Dynasty","Legacy","Heritage","Empire","Realm","Kingdom","Fortress","Citadel","Spire"];
const types=["Holdings","Ventures","Capital","Partners","Group","Alliance","Collective","Syndicate","Consortium","Enterprises","Innovations","Labs","Studios","Works","Forge","Foundry","Gardens","Fields","Harbor","Port"];
const suffixes=["International","Global","Worldwide","Universal","Cosmic","Galactic","Infinite","Eternal","Immortal","Divine"];
for(let i=16;i<=392;i++){const ni=(i-16)%names.length;const ti=Math.floor((i-16)/20)%types.length;const si=Math.floor((i-16)/100)%suffixes.length;companies.push({id:i,name:`${names[ni]} ${types[ti]} ${suffixes[si]}`,desc:`Empire Floor ${i} — Derek Francisco Holdings`,domain:`floor${i}.franciscoholdingsinc.com`,color:`hsl(${(i*137.5)%360},80%,60%)`,icon:"🏢"})}
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x020202,0.0008);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setClearColor(0x020202);document.getElementById("canvas-container").appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x1a1a2e,1.5));const sun=new THREE.DirectionalLight(0xc9b037,0.8);sun.position.set(100,200,100);scene.add(sun);
const pls=[];for(let i=0;i<5;i++){const pl=new THREE.PointLight(0xc9b037,0.4,200);pl.position.set(Math.sin(i*1.25)*50,i*80,Math.cos(i*1.25)*50);scene.add(pl);pls.push(pl)}
const sg=new THREE.BufferGeometry();const sc=Math.min(1800,Math.floor(innerWidth*innerHeight/500));const sp=new Float32Array(sc*3);for(let i=0;i<sc*3;i++)sp[i]=(Math.random()-0.5)*2000;sg.setAttribute("position",new THREE.BufferAttribute(sp,3));scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:0.7})));
const ground=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({color:0x0a0a0a,metalness:0.95,roughness:0.05}));ground.rotation.x=-Math.PI/2;ground.position.y=-5;scene.add(ground);
const floors=[];const fg=new THREE.Group();scene.add(fg);const fh=8;const fg2=2;const sy=0;
companies.forEach((c,idx)=>{const i=idx+1;const s=Math.max(3,10-(i*0.015));const geo=new THREE.BoxGeometry(s,fh,s);let col;if(c.color.startsWith('hsl')){const m=c.color.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);if(m){const h=parseInt(m[1])/360;const s2=parseInt(m[2])/100;const l=parseInt(m[3])/100;col=new THREE.Color().setHSL(h,s2,l)}else col=new THREE.Color(0x888888)}else col=new THREE.Color(c.color);const mat=new THREE.MeshStandardMaterial({color:col,metalness:0.85,roughness:0.15,emissive:col,emissiveIntensity:0.12});const mesh=new THREE.Mesh(geo,mat);mesh.position.y=sy+(i-1)*(fh+fg2);mesh.name=`Floor_${i}`;mesh.userData=c;const rg=new THREE.RingGeometry(s*0.6,s*0.7,32);const rm=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.25,side:THREE.DoubleSide});const ring=new THREE.Mesh(rg,rm);ring.rotation.x=-Math.PI/2;ring.position.y=fh/2+0.1;mesh.add(ring);if(i%3===0){const wg=new THREE.BoxGeometry(s*0.8,fh*0.6,s*1.01);const wm=new THREE.MeshBasicMaterial({color:0xffffaa,transparent:true,opacity:0.08});mesh.add(new THREE.Mesh(wg,wm))}fg.add(mesh);floors.push(mesh)});
const shaft=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,(fh+fg2)*392,16,1,true),new THREE.MeshBasicMaterial({color:0x1a1a1a,transparent:true,opacity:0.15,side:THREE.DoubleSide}));shaft.position.y=((fh+fg2)*392)/2-fh/2;scene.add(shaft);

let cf=1;let ty=0;let ia=false;camera.position.set(25,15,35);camera.lookAt(0,0,0);
function updateUI(f){const c=companies[f-1];if(!c)return;document.getElementById("floor-name").textContent=c.name;document.getElementById("floor-name").style.color=c.color;document.getElementById("floor-desc").textContent=c.desc;document.getElementById("floor-domain").textContent=c.domain;document.getElementById("floor-counter").textContent=`FLOOR ${f} / 392`;const btn=document.getElementById("paypal-cta");const tiers=[{max:50,price:49},{max:100,price:99},{max:150,price:499},{max:200,price:999},{max:250,price:2999},{max:300,price:9999},{max:350,price:49999}];let price="PRICELESS";for(const t of tiers){if(f<=t.max){price=`$${t.price.toLocaleString()}/mo`;break}}btn.textContent=f===1?"Start Your Empire — $49/mo":f<=350?`Unlock ${c.name} — ${price}`:`${c.name} — PRICELESS`;btn.onclick=()=>{if(f<=350)window.open(`https://www.paypal.com/paypalme/TechPetCage/${price.replace(/[^0-9]/g,'')}CAD`,'_blank');else alert("Floor 351-392: Transcendent Tier. Contact Derek Francisco directly.")};}

function nextFloor(){goTo(cf+1)}function prevFloor(){goTo(cf-1)}
const panel=document.getElementById("elevator-panel");for(let i=1;i<=392;i+=10){const b=document.createElement("button");b.className="elevator-btn";b.textContent=i;b.onclick=()=>goTo(i);panel.appendChild(b)}const tb=document.createElement("button");tb.className="elevator-btn";tb.textContent="▲";tb.style.fontSize="0.5rem";tb.onclick=()=>goTo(392);panel.insertBefore(tb,panel.firstChild);const bb=document.createElement("button");bb.className="elevator-btn";bb.textContent="▼";bb.style.fontSize="0.5rem";bb.onclick=()=>goTo(1);panel.appendChild(bb);

window.addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
setTimeout(()=>{document.getElementById("loading").style.opacity="0";setTimeout(()=>document.getElementById("loading").style.display="none",2000)},4500);
let kc=[];const kc2=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];window.addEventListener('keydown',e=>{kc.push(e.key);kc=kc.slice(-10);if(kc.join(',')===kc2.join(',')){alert('🎉 GOD MODE ACTIVATED — Derek Francisco welcomes you to Floor 392');goTo(392)}});

</script>
