<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="theme-color" content="#d4af37"><title>CCLDR</title><link rel="manifest" href="manifest.json"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Georgia',serif;background:#1a1209;color:#d4af37;min-height:100vh}.gate{position:fixed;inset:0;background:#1a1209;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}.gate h1{font-size:32px;letter-spacing:4px;margin-bottom:8px}.gate input{background:#2d1f0e;border:1px solid #d4af37;color:#d4af37;padding:16px;font-size:18px;text-align:center;border-radius:8px;width:100%;max-width:320px;margin-bottom:12px}.gate .btn{background:#d4af37;color:#1a1209;border:none;padding:16px 32px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;width:100%;max-width:320px}.gate .error{color:#ff4444;margin-top:12px;font-size:14px;display:none}.app{display:none}.header{text-align:center;padding:20px 0;border-bottom:2px solid #d4af37;margin-bottom:20px}.header h1{font-size:24px;letter-spacing:2px}.doc-selector{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;padding:0 16px;max-width:600px;margin:0 auto 20px}.doc-btn{background:#2d1f0e;border:1px solid #d4af37;color:#d4af37;padding:16px;font-size:16px;border-radius:6px;cursor:pointer;text-align:left}.doc-btn.active{background:#d4af37;color:#1a1209;font-weight:bold}.form-panel{background:#2d1f0e;border:1px solid #d4af37;border-radius:8px;padding:16px;margin:0 16px 20px;max-width:600px;margin:0 auto 20px}.form-group{margin-bottom:14px}label{display:block;font-size:13px;color:#c9b896;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}input,textarea{width:100%;background:#1a1209;border:1px solid #5a4a2f;color:#d4af37;padding:12px;font-size:16px;border-radius:4px;font-family:'Georgia',serif}textarea{min-height:100px;resize:vertical}.actions{display:flex;gap:10px;margin-top:20px}.btn-doc{flex:1;padding:16px;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer}.btn-primary{background:#d4af37;color:#1a1209}.btn-secondary{background:transparent;border:1px solid #d4af37;color:#d4af37}.output-panel{background:#fff;color:#000;padding:24px;border-radius:8px;margin:20px 16px;display:none;font-family:'Times New Roman',serif;line-height:1.6;max-width:600px;margin:20px auto}.output-panel.active{display:block}@media print{body{background:#fff;color:#000}.gate,.header,.doc-selector,.form-panel,.actions{display:none}.output-panel{display:block!important;box-shadow:none;border:none}}</style></head><body><div class="gate" id="gate"><h1>CCLDR</h1><p>Enter access code</p><input type="text" id="codeInput" placeholder="XXXX-XXXX-XXXX" maxlength="20"><button class="btn" onclick="unlock()">UNLOCK</button><div class="error" id="error">Invalid code.</div></div><div class="app" id="app"><div class="header"><h1>CCLDR</h1><p>Constitutional Cannabis Legal Document Resource</p></div><div class="doc-selector"><button class="doc-btn active" onclick="selectDoc('form19a')">Form 19A</button><button class="doc-btn" onclick="selectDoc('draftorder')">Draft Order</button><button class="doc-btn" onclick="selectDoc('claim')">Statement of Claim</button></div><div class="form-panel" id="formPanel"><div id="fields"></div><div class="actions"><button class="btn-doc btn-primary" onclick="generate()">Generate</button><button class="btn-doc btn-secondary" onclick="window.print()">Print/PDF</button></div></div><div class="output-panel" id="output"></div></div><script>const VALID=["d35dc16450a130c39964d39b6916033a0d81bc883eeb8a67bd2973150b2db72b","d896bf0bcc000ba14df0513c9081e127fd569ca436438be088f9155da2ba8ca3","22690737dd103954521c96c005f8a929af547b6f57e0602c118c2cee68a3ea19"];async function sha256(t){const e=new TextEncoder().encode(t),b=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}async function unlock(){const c=document.getElementById('codeInput').value.trim().toUpperCase();const h=await sha256(c);if(VALID.includes(h)){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';localStorage.setItem('ccldr_access','granted')}else{document.getElementById('error').style.display='block'}}if(localStorage.getItem('ccldr_access')==='granted'){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block'}const templates={form19a:{title:"Form 19A",fields:[{name:"court",label:"Court",default:"Ontario Superior Court of Justice"},{name:"fileNumber",label:"File No",default:"CV-26-00000064-0000"},{name:"applicant",label:"Applicant",default:"Derek Francisco"},{name:"respondent",label:"Respondent",default:"Bill Denby, Gwen Denby, et al."},{name:"orderSought",label:"Order Sought",default:"Leave to amend Statement of Claim",type:"textarea"},{name:"grounds",label:"Grounds",default:"Rule 26.02(c)",type:"textarea"},{name:"date",label:"Date",default:new Date().toISOString().split('T')[0]}]},draftorder:{title:"Draft Order",fields:[{name:"court",label:"Court",default:"Ontario Superior Court of Justice"},{name:"fileNumber",label:"File No",default:"CV-26-00000064-0000"},{name:"plaintiff",label:"Plaintiff",default:"Derek Francisco"},{name:"defendant",label:"Defendant",default:"Bill Denby, et al."},{name:"relief",label:"Relief",default:"1. Leave to amend;\n2. Add 2413319 Ontario Inc.",type:"textarea"},{name:"date",label:"Date",default:new Date().toISOString().split('T')[0]}]},claim:{title:"Statement of Claim",fields:[{name:"court",label:"Court",default:"Ontario Superior Court of Justice"},{name:"fileNumber",label:"File No",default:"CV-26-00000064-0000"},{name:"plaintiff",label:"Plaintiff",default:"Derek Francisco"},{name:"defendant",label:"Defendant",default:"Bill Denby, Gwen Denby, et al."},{name:"relief",label:"Relief",default:"$3,300,000 damages",type:"textarea"},{name:"particulars",label:"Particulars",default:"Trespass, conversion, negligence",type:"textarea"},{name:"date",label:"Date",default:new Date().toISOString().split('T')[0]}]}};let currentDoc='form19a';function selectDoc(type){currentDoc=type;document.querySelectorAll('.doc-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderFields()}function renderFields(){const t=templates[currentDoc];document.getElementById('fields').innerHTML=t.fields.map(f=>`<div class="form-group"><label>${f.label}</label>${f.type==='textarea'?`<textarea id="${f.name}" rows="4">${f.default}</textarea>`:`<input type="text" id="${f.name}" value="${f.default}">`}</div>`).join('')}function generate(){const t=templates[currentDoc];const v={};t.fields.forEach(f=>v[f.name]=document.getElementById(f.name).value);let h=`<h2>${t.title}</h2>`;if(currentDoc==='form19a')h+=`<div style="text-align:center"><strong>Court File No. ${v.fileNumber}</strong><br><strong>${v.court}</strong></div><div><strong>Applicant:</strong> ${v.applicant}<br><strong>Respondent:</strong> ${v.respondent}</div><div><strong>APPLICATION</strong><br>${v.orderSought.replace(/\n/g,'<br>')}</div><div><strong>Grounds:</strong><br>${v.grounds.replace(/\n/g,'<br>')}</div><div><strong>Date:</strong> ${v.date}<br><br>_________________________<br>${v.applicant}<br>Self-Represented</div>`;else if(currentDoc==='draftorder')h+=`<div style="text-align:center"><strong>IN THE ${v.court.toUpperCase()}</strong><br><br>BETWEEN:<br>${v.plaintiff}<br>Plaintiff<br><br>- and -<br><br>${v.defendant}<br>Defendant</div><div style="text-align:center"><strong>DRAFT ORDER</strong></div><div><strong>ORDER:</strong><br>${v.relief.replace(/\n/g,'<br>')}</div><div><strong>Date:</strong> ${v.date}</div>`;else if(currentDoc==='claim')h+=`<div style="text-align:center"><strong>IN THE ${v.court.toUpperCase()}</strong><br><strong>Court File No. ${v.fileNumber}</strong></div><div>BETWEEN:<br>${v.plaintiff}<br>Plaintiff<br><br>- and -<br><br>${v.defendant}<br>Defendant</div><div style="text-align:center"><strong>STATEMENT OF CLAIM</strong></div><div><strong>Relief:</strong><br>${v.relief.replace(/\n/g,'<br>')}</div><div><strong>Particulars:</strong><br>${v.particulars.replace(/\n/g,'<br>')}</div><div><strong>Date:</strong> ${v.date}<br><br>_________________________<br>${v.plaintiff}<br>Self-Represented</div>`;const o=document.getElementById('output');o.innerHTML=h;o.classList.add('active');o.scrollIntoView({behavior:'smooth'})}renderFields();if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script></body></html>
